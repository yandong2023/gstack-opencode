name: Feature Request
description: Suggest an idea for a new role or workflow.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        We love new ideas for GStack roles!
  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: What would you like to see added?
      placeholder: Describe the new role or workflow.
    validations:
      required: true
  - type: textarea
    id: benefit
    attributes:
      label: Why is this helpful?
      description: How will this improve the GStack workflow?
    validations:
      required: true
